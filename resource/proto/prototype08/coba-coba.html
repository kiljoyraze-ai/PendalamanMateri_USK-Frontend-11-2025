<!DOCTYPE html>
<html>
<head>
<title>Garis Vertikal</title>
<style>
.container {
  display: flex; /* Menggunakan flexbox untuk memposisikan elemen berdampingan */
}

.konten {
  width: 200px; /* Lebar konten */
  padding: 10px;
}

.garis-vertikal {
  height: 50px; /* Tinggi garis */
  width: 2px; /* Lebar garis (ketebalan) */
  background-color: gray; /* Warna garis */
}
</style>
</head>
<body>

<div class="container">
  <div class="konten">Konten Kiri</div>
  <div class="garis-vertikal"></div>
  <div class="konten">Konten Kanan</div>
</div>

</body>
</html>
