<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      text-decoration: none;
    }
    body{
        background-color: rgb(255, 255, 255);
        min-height: 100vh;
    }
    nav {
      position: fixed;
      top: 0;
      left: 10%;
      width: 80%; /* Lebar navbar */
      margin: 0 auto; /* Center horizontal */
      backdrop-filter: blur(10px);
      border-radius: 0 0 10px 10px; /* Biar agak rounded */
      box-shadow: 10px 5px 10px rgba(95, 84, 84, 0.449); /* Bayangan lembut */
      padding: 12px 0;
    }

    nav ul {
      display: flex;
      justify-content: center;
      gap: 24px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    nav ul li a{
      color: rgb(74, 76, 78);
      font-weight: 300;

    }
    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 50vh;
        gap: 5rem;
    }
    img{
        width: 100%;
        border-radius: 100rem;
    }
    .image-about{
        max-width: 25%;
    }
    .container .txt-about{
        max-width: 35%;
    }
    .container .txt-about h1{
        margin-bottom: 1rem;
    }
    .container .txt-about p{
        font-size: 1.2rem;
    }
    .container .txt-about .btn-about button{
        margin-top: 1rem;
        border: none;
       background: linear-gradient(to right, rgb(80, 224, 232), rgb(54, 141, 248));
        border-radius: 5px;
        width: 100%;
        padding: 1rem;
        font-size: 1.2rem;
        color: rgb(31, 34, 36);
        font-weight: 700;
        transition: all 0.5s ease-out;
    }
    .container .txt-about .btn-about button:hover{
        color: aliceblue;
        background: linear-gradient(to right, rgb(94, 175, 179), rgb(40, 100, 173));
    }


    
  </style>
  <body>
    <nav>
      <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
    <section id="about">
      <div class="container">
        <div class="txt-about">
          <h1>HOLLA ITS BRYAN</h1>
          <h1>WEB DEVELOPMENT | PROGRAMMER</h1>
          <p>
            Lorem ipsum dolor sit, amet consectetur adipisicing elit. Ea,
            voluptates.
          </p>
          <div class="btn-about">
            <button>Hello Guys anjg</button>
          </div>
        </div>
        <div class="image-about">
            <img src="profile1.png" alt="">
        </div>
      </div>
    </section>
    <section>
      <div class="container-bio">
        .
      </div>
    </section>
  </body>
</html>
