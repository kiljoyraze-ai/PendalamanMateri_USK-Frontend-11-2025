<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>typing text animation opsionoal</title>
    <style>
      #typing-style {
        font-family: monospace;
        font-size: 1.3rem;
        border-right: 2px solid #101010;
        display: inline-block;
        animation: blink-cursor 0.9s steps(1) infinite;
      }

      @keyframes blink-cursor {
        0%,
        100% {
          border-color: transparent;
        }
        50% {
          border-color: #0f0f0f;
        }
      }
    </style>
  </head>
  <body>
    <h1>Typing text animation</h1>
    <p id="typing-style"></p>
    <script>
      const texts = ["Hanya saya BRyan on the gank",
       "WEB DEV", 
       "PROGRAMMER"];
      let textIndex = 0;
      let charIndex = 0;

      function typeWriter() {
        if (charIndex < texts[textIndex].length) {
          document.getElementById("typing-style").innerHTML +=
            texts[textIndex].charAt(charIndex);
          charIndex++;
          setTimeout(typeWriter, 80);
        } else {
          setTimeout(() => {
            document.getElementById("typing-style").innerHTML = ""; // hapus teks selesai
            charIndex = 0;
            textIndex = (textIndex + 1) % texts.length; // pindah ke kalimat berikut, balik ke awal kalau sudah terakhir
            typeWriter();
          }, 1000); // jeda sebelum teks berikutnya
        }
      }

      window.onload = typeWriter;
      // mulai saat halaman diload
    </script>
  </body>
</html>
